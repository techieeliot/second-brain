site_name: second-brain
site_description: Documentation for second-brain

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.footer

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details

nav:
  - Home: index.md
  - Getting Started: GUIDE-001-getting-started.md
  - API Reference: REF-001-api-reference.md
  - Project Standards:
      - Documentation: GUIDE-004-docs-standards.md
      - AI Prompting: GUIDE-002-ai-prompting.md
      - Code Review: GUIDE-003-code-review.md
      - Expert Panel: SPEC-001-expert-panel.md
